server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Required for SharedArrayBuffer — openslide-js uses WASM with pthreads
    add_header Cross-Origin-Opener-Policy  "same-origin"  always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;

    # SPA fallback so React routing works on direct URL access
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-lived cache for hashed assets (JS, CSS, WASM, images)
    location ~* \.(js|css|wasm|png|jpg|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Headers must be repeated inside location blocks
        add_header Cross-Origin-Opener-Policy  "same-origin"  always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
    }
}
