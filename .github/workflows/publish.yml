name: Publish

on:
  release:
    types: [published]

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm (for trusted publishing OIDC)
        run: npm install -g npm@latest

      - name: Print versions
        run: |
          node --version
          npm --version

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build WASM via Docker
        uses: docker/build-push-action@v6
        with:
          context: ./wasm
          load: true
          tags: openslide-wasm-builder:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract WASM artifacts
        run: |
          docker create --name wasm-extract openslide-wasm-builder:latest
          mkdir -p wasm/dist
          docker cp wasm-extract:/build/out/openslide.js wasm/dist/
          docker cp wasm-extract:/build/out/openslide.wasm wasm/dist/
          docker rm wasm-extract

      - name: Build TypeScript
        run: npm run build:ts

      - name: Unit tests
        run: npm test

      - name: Publish to npm
        run: npm publish --provenance

      - name: Attach WASM to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            wasm/dist/openslide.js
            wasm/dist/openslide.wasm
